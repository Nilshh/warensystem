<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR-Etiketten ({{ labels|length }})</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; color: #111;
           margin: 0; background: #f0f0f0; }
    .toolbar { max-width: 900px; margin: 1rem auto 0; display: flex; gap: .5rem; align-items: center; }
    .toolbar .count { color: #666; font-size: .9rem; margin-left: auto; }
    .btn { padding: .5rem .9rem; border: 1px solid #ccc; border-radius: 8px; background: #fff;
           cursor: pointer; font-size: .9rem; text-decoration: none; color: #111; }
    .btn.primary { background: #2b6cff; border-color: #2b6cff; color: #fff; }

    .sheet { max-width: 900px; margin: 1rem auto; display: grid;
             grid-template-columns: repeat(auto-fill, minmax(62mm, 1fr)); gap: 4mm; }
    .label { background: #fff; padding: 4mm; border: 1px solid #ddd; border-radius: 6px;
             text-align: center; break-inside: avoid; page-break-inside: avoid; }
    .label .qr { width: 36mm; height: 36mm; margin: 0 auto; }
    .label .qr svg { width: 100%; height: 100%; display: block; }
    .label .artno { font-family: ui-monospace, monospace; font-weight: 700; font-size: .95rem; margin-top: 2mm; }
    .label .title { font-size: .72rem; margin-top: 1mm; line-height: 1.3;
                    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .empty { max-width: 900px; margin: 3rem auto; text-align: center; color: #666; }

    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .sheet { margin: 0; max-width: none; gap: 3mm; }
      .label { border: 1px dashed #ccc; border-radius: 0; }
      @page { margin: 8mm; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="btn primary" onclick="window.print()">🖨 Etiketten drucken</button>
    <a class="btn" href="/articles">← Zurück zur Liste</a>
    <span class="count">{{ labels|length }} Etikett{{ 'en' if labels|length != 1 else '' }}</span>
  </div>

  {% if labels %}
  <div class="sheet">
    {% for l in labels %}
    <div class="label">
      <div class="qr">{{ l.qr_svg }}</div>
      {% if l.article.article_no %}<div class="artno">{{ l.article.article_no }}</div>{% endif %}
      <div class="title">{{ l.article.title }}</div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty"><p>Keine Artikel ausgewählt.</p></div>
  {% endif %}
</body>
</html>
