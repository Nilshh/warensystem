<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lager-Etikett {{ label }}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; color: #111;
           margin: 0; background: #f0f0f0; }
    .toolbar { max-width: 480px; margin: 1rem auto 0; display: flex; gap: .5rem; }
    .btn { padding: .5rem .9rem; border: 1px solid #ccc; border-radius: 8px; background: #fff;
           cursor: pointer; font-size: .9rem; text-decoration: none; color: #111; }
    .btn.primary { background: #2b6cff; border-color: #2b6cff; color: #fff; }

    .label {
      background: #fff; width: 80mm; margin: 1rem auto; padding: 6mm;
      border: 1px solid #ddd; border-radius: 6px; text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
    }
    .label .heading { font-size: .75rem; letter-spacing: .05em; text-transform: uppercase; color: #888; margin-bottom: 3mm; }
    .label .qr { width: 50mm; height: 50mm; margin: 0 auto; }
    .label .qr svg { width: 100%; height: 100%; display: block; }
    .label .loc { font-weight: 700; font-size: 1.15rem; margin-top: 4mm; }
    .label .url { font-size: .6rem; color: #888; margin-top: 2mm; word-break: break-all; }

    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .label { margin: 0; border: none; border-radius: 0; box-shadow: none; }
      @page { margin: 8mm; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="btn primary" onclick="window.print()">🖨 Lager-Etikett drucken</button>
    <a class="btn" href="/storage/location?{{ query }}">← Zurück</a>
  </div>

  <div class="label">
    <div class="heading">Lagerplatz</div>
    <div class="qr">{{ qr_svg }}</div>
    <div class="loc">📍 {{ label }}</div>
    <div class="url">{{ url }}</div>
  </div>
</body>
</html>
