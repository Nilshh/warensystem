services:
  warensystem:
    build: .
    container_name: warensystem
    ports:
      - "8000:8000"
    volumes:
      # DB + hochgeladene Bilder bleiben auf dem Host erhalten
      - ./data:/data
    # Secrets/Konfiguration aus einer nicht eingecheckten .env laden (optional).
    # Für den ersten Start: cp .env.example .env
    env_file:
      - path: .env
        required: false
    environment:
      - DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
